# ================================================================
#  /etc/litestream.yml — Litestream Replication Config
#  Tất cả giá trị nhạy cảm đều đọc từ environment variables.
#
#  Biến bắt buộc:
#    LITESTREAM_S3_ENDPOINT      — Supabase: https://<id>.supabase.co/storage/v1/s3
#    LITESTREAM_S3_BUCKET        — Tên bucket trong Supabase Storage
#    LITESTREAM_S3_PATH          — Prefix path trong bucket (mặc định: omniroute/storage.sqlite)
#    LITESTREAM_S3_ACCESS_KEY_ID — Supabase S3 access key
#    LITESTREAM_S3_SECRET_ACCESS_KEY — Supabase S3 secret key
# ================================================================

dbs:
  - path: /app/data/storage.sqlite
    replicas:
      - type: s3
        endpoint: ${LITESTREAM_S3_ENDPOINT}
        bucket: ${LITESTREAM_S3_BUCKET}
        path: ${LITESTREAM_S3_PATH}
        access-key-id: ${LITESTREAM_S3_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_S3_SECRET_ACCESS_KEY}
        # Upload WAL frames lên S3 mỗi 5s
        # Sync interval — đủ nhanh để không mất quá nhiều data khi node bị kill
        # → mất tối đa 5s data nếu SIGKILL không có grace period
        sync-interval: 5s

        # Tạo full snapshot mỗi 1h → restore nhanh hơn (không cần replay toàn bộ WAL)
        snapshot-interval: 1h

        # Giữ 48h generations cũ, tự dọn generations cũ hơn
        # → giải quyết vấn đề "nhiều folder" bạn thấy trên S3
        retention: 48h
        retention-check-interval: 1h
